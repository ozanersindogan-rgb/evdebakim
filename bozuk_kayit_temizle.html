<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bozuk Kayıt Temizleme</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: sans-serif; padding: 20px; max-width: 860px; margin: 0 auto; background: #f8fafc; color: #1e293b; }
  h2 { color: #1e293b; margin-bottom: 4px; }
  .desc { color: #64748b; font-size: 14px; margin-bottom: 20px; line-height: 1.6; }

  .btn { padding: 11px 22px; border: none; border-radius: 9px; cursor: pointer; font-size: 14px; font-weight: 700; margin: 4px; transition: opacity .15s; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-blue  { background: #3b82f6; color: #fff; }
  .btn-red   { background: #ef4444; color: #fff; }
  .btn-gray  { background: #e2e8f0; color: #475569; }

  #ozet { border-radius: 10px; padding: 14px 18px; margin: 16px 0; display: none; font-size: 14px; line-height: 1.8; }
  .ozet-ok   { background: #f0fdf4; border: 1px solid #86efac; }
  .ozet-warn { background: #fef9c3; border: 1px solid #fde047; }

  #log { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px; min-height: 120px; font-size: 13px; line-height: 1.8; margin-top: 12px; }

  .kayit-kart {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
    background: #fff7ed; border: 1px solid #fed7aa;
  }
  .kayit-kart .isim  { font-weight: 800; color: #1e293b; }
  .kayit-kart .detay { font-size: 12px; color: #64748b; margin-top: 2px; }
  .eksik { display: inline-block; background: #fef2f2; color: #dc2626; border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 700; border: 1px solid #fecaca; margin-left: 4px; }
  .badge { display: inline-block; background: #e0e7ff; color: #3730a3; border-radius: 4px; padding: 1px 7px; font-size: 11px; }
  .silindi { opacity: .4; text-decoration: line-through; }

  .progress { height: 6px; background: #e2e8f0; border-radius: 3px; margin: 10px 0; overflow: hidden; }
  .progress-bar { height: 100%; background: #3b82f6; border-radius: 3px; transition: width .3s; }

  .auth-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
  .auth-box input { width: 100%; padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
  .auth-box label { font-size: 13px; font-weight: 700; color: #64748b; display: block; margin-bottom: 4px; }
</style>
</head>
<body>

<h2>🧹 Bozuk Kayıt Temizleme</h2>
<p class="desc">
  <strong>HİZMET</strong> veya <strong>AY</strong> alanı boş olan kayıtları tespit eder ve siler.<br>
  Normal kayıtlara (<em>her iki alan da dolu olanlara</em>) kesinlikle dokunulmaz.
</p>

<!-- Giriş -->
<div class="auth-box" id="auth-box">
  <label>E-posta</label>
  <input type="email" id="inp-email" placeholder="kullanici@mail.com">
  <label>Şifre</label>
  <input type="password" id="inp-sifre" placeholder="••••••••">
  <button class="btn btn-blue" onclick="girisYap()">🔐 Giriş Yap</button>
  <div id="auth-msg" style="font-size:13px;color:#ef4444;margin-top:8px"></div>
</div>

<!-- İşlem butonları -->
<div id="islem-panel" style="display:none">
  <button class="btn btn-blue"  id="btn-tara"   onclick="tara()">🔍 Bozuk Kayıtları Tara</button>
  <button class="btn btn-red"   id="btn-sil"    onclick="silOnay()" style="display:none">🗑️ Seçilenleri Sil</button>
  <button class="btn btn-gray"  id="btn-reset"  onclick="resetEkran()" style="display:none">↩ Sıfırla</button>
</div>

<div id="ozet"></div>
<div class="progress" id="progress-wrap" style="display:none"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
<div id="log">Giriş yapıldıktan sonra tarama başlatılabilir.</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script>
const _app = firebase.initializeApp({
  apiKey: "AIzaSyCc0AhkPaIzmUewk_szFLmxqfMMmMctnHw",
  authDomain: "evdebakim-ca02e.firebaseapp.com",
  projectId: "evdebakim-ca02e",
  storageBucket: "evdebakim-ca02e.firebasestorage.app",
  messagingSenderId: "708187732533",
  appId: "1:708187732533:web:34d1fea5bb82bfad2b0f7c"
});
const _auth = firebase.auth();
const _db   = firebase.firestore();

let bozukKayitlar = [];  // { _fbId, ISIM_SOYISIM, HİZMET, AY, MAHALLE, nedenler[] }

// ── Giriş ──
async function girisYap() {
  const email = document.getElementById('inp-email').value.trim();
  const sifre = document.getElementById('inp-sifre').value;
  const msg   = document.getElementById('auth-msg');
  msg.textContent = '⏳ Giriş yapılıyor...';
  try {
    await _auth.signInWithEmailAndPassword(email, sifre);
    document.getElementById('auth-box').style.display    = 'none';
    document.getElementById('islem-panel').style.display = 'block';
    log('✅ Giriş başarılı. Tarama için butona basın.');
  } catch(e) {
    msg.textContent = '❌ ' + (e.message || 'Giriş hatası');
  }
}

// ── Tarama ──
async function tara() {
  setBtn('btn-tara', true);
  setBtn('btn-sil', false); document.getElementById('btn-sil').style.display = 'none';
  document.getElementById('btn-reset').style.display = 'none';
  bozukKayitlar = [];

  log('⏳ Kayıtlar yükleniyor...');
  progress(10);

  let snap;
  try {
    snap = await _db.collection('vatandaslar').get();
  } catch(e) {
    log('❌ Firestore hatası: ' + e.message);
    setBtn('btn-tara', false);
    return;
  }

  progress(50);
  const toplam = snap.size;
  log(`📦 ${toplam} kayıt yüklendi. Taranıyor...`);

  snap.forEach(doc => {
    const d = doc.data();
    const nedenler = [];
    const hizmet = (d['HİZMET'] || d['HIZMET'] || '').trim();
    const ay     = (d['AY'] || '').trim();
    if (!hizmet) nedenler.push('HİZMET boş');
    if (!ay)     nedenler.push('AY boş');
    if (nedenler.length) {
      bozukKayitlar.push({
        _fbId:       doc.id,
        ISIM_SOYISIM: d.ISIM_SOYISIM || '(isim yok)',
        'HİZMET':    hizmet,
        AY:          ay,
        MAHALLE:     d.MAHALLE || '',
        DURUM:       d.DURUM   || '',
        nedenler
      });
    }
  });

  progress(100);
  setTimeout(() => {
    document.getElementById('progress-wrap').style.display = 'none';
    progress(0);
  }, 600);

  setBtn('btn-tara', false);

  if (!bozukKayitlar.length) {
    ozetGoster(`✅ Tüm ${toplam} kayıt sağlıklı — silinecek bozuk kayıt bulunamadı.`, 'ok');
    log('<span style="color:#16a34a;font-weight:700">🎉 Temiz! Hiçbir bozuk kayıt yok.</span>');
    return;
  }

  // Özet
  ozetGoster(
    `⚠️ <strong>${toplam}</strong> kayıt içinde <strong>${bozukKayitlar.length}</strong> bozuk kayıt bulundu. ` +
    `Aşağıda listesi var — inceleyip onaylarsan sil.`,
    'warn'
  );

  // Liste
  const html = bozukKayitlar.map((k, i) =>
    `<div class="kayit-kart" id="kart-${i}">
      <div style="flex:1">
        <div class="isim">${k.ISIM_SOYISIM}
          ${k.nedenler.map(n => `<span class="eksik">⚠ ${n}</span>`).join('')}
        </div>
        <div class="detay">
          <span class="badge">${k.MAHALLE || '—'}</span>
          HİZMET: <b>${k['HİZMET'] || '(boş)'}</b> &nbsp;|&nbsp;
          AY: <b>${k.AY || '(boş)'}</b> &nbsp;|&nbsp;
          DURUM: <b>${k.DURUM || '—'}</b>
          <br><span style="color:#94a3b8;font-size:11px">ID: ${k._fbId}</span>
        </div>
      </div>
    </div>`
  ).join('');

  document.getElementById('log').innerHTML =
    `<div style="font-weight:800;margin-bottom:10px;color:#b45309">🔍 Bulunan bozuk kayıtlar (${bozukKayitlar.length} adet):</div>` + html;

  document.getElementById('btn-sil').style.display   = 'inline-block';
  document.getElementById('btn-reset').style.display = 'inline-block';
}

// ── Silme onayı ──
function silOnay() {
  const sayi = bozukKayitlar.length;
  if (!confirm(
    `${sayi} bozuk kayıt SİLİNECEK.\n\n` +
    `• Yalnızca HİZMET veya AY alanı boş kayıtlar silinir.\n` +
    `• Normal kayıtlara dokunulmaz.\n\n` +
    `Onaylıyor musunuz?`
  )) return;
  silIslem();
}

// ── Silme işlemi ──
async function silIslem() {
  setBtn('btn-sil', true);
  setBtn('btn-tara', true);
  document.getElementById('progress-wrap').style.display = 'block';

  let silindi = 0;
  const toplam = bozukKayitlar.length;

  // 500'lük batch'ler halinde sil
  const BATCH_LIMIT = 400;
  for (let i = 0; i < toplam; i += BATCH_LIMIT) {
    const dilim = bozukKayitlar.slice(i, i + BATCH_LIMIT);
    const batch = _db.batch();
    dilim.forEach(k => {
      batch.delete(_db.collection('vatandaslar').doc(k._fbId));
    });
    try {
      await batch.commit();
      silindi += dilim.length;
      progress(Math.round((silindi / toplam) * 100));
      // UI'da silinen kartları işaretle
      dilim.forEach((k, j) => {
        const kart = document.getElementById(`kart-${i + j}`);
        if (kart) kart.classList.add('silindi');
      });
    } catch(e) {
      log('❌ Batch hatası: ' + e.message);
      setBtn('btn-sil', false);
      setBtn('btn-tara', false);
      return;
    }
  }

  setTimeout(() => {
    document.getElementById('progress-wrap').style.display = 'none';
  }, 600);

  ozetGoster(
    `✅ <strong>${silindi}</strong> bozuk kayıt başarıyla silindi.`,
    'ok'
  );

  document.getElementById('btn-sil').style.display = 'none';
  setBtn('btn-tara', false);

  // Log sonuna özet ekle
  const sonNot = document.createElement('div');
  sonNot.style.cssText = 'margin-top:14px;padding:10px 14px;background:#f0fdf4;border-radius:8px;font-weight:700;color:#16a34a;font-size:14px';
  sonNot.textContent = `🎉 Tamamlandı — ${silindi} kayıt silindi. Sayfayı yenileyebilirsiniz.`;
  document.getElementById('log').appendChild(sonNot);
}

// ── Yardımcılar ──
function resetEkran() {
  bozukKayitlar = [];
  document.getElementById('log').textContent = 'Tekrar tarama için butona basın.';
  document.getElementById('ozet').style.display = 'none';
  document.getElementById('btn-sil').style.display   = 'none';
  document.getElementById('btn-reset').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
}

function ozetGoster(html, tip) {
  const el = document.getElementById('ozet');
  el.innerHTML = html;
  el.className = tip === 'ok' ? 'ozet-ok' : 'ozet-warn';
  el.style.display = 'block';
}

function log(msg) {
  document.getElementById('log').innerHTML = msg;
}

function setBtn(id, disabled) {
  const el = document.getElementById(id);
  if (el) el.disabled = disabled;
}

function progress(pct) {
  const wrap = document.getElementById('progress-wrap');
  const bar  = document.getElementById('progress-bar');
  if (pct > 0) wrap.style.display = 'block';
  bar.style.width = pct + '%';
}
</script>
</body>
</html>
