async function giris() {
  const btn = document.getElementById('giris-btn');
  const hata = document.getElementById('giris-hata');
  hata.style.display='none'; btn.disabled=true; btn.textContent='Giriş yapılıyor...';
  try {
    await auth.signInWithEmailAndPassword(
      document.getElementById('email').value.trim(),
      document.getElementById('sifre').value
    );
    document.getElementById('giris').style.display='none';
    document.getElementById('yukle').style.display='block';
  } catch(e) {
    hata.style.display='block'; hata.textContent='Hata: '+e.message;
    btn.disabled=false; btn.textContent='🔐 Giriş Yap';
  }
}

async function baslat() {
  const btn=document.getElementById('bas-btn');
  const bar=document.getElementById('bar');
  const durum=document.getElementById('durum');
  const sure=document.getElementById('sure');
  btn.disabled=true; btn.textContent='Güncelleniyor...';

  // Tüm kayıtları çek
  durum.textContent='Kayıtlar okunuyor...';
  const snap = await db.collection('vatandaslar_bilgi').get();
  const docs = snap.docs;
  const toplam = docs.length;
  let guncellenen=0, atlan=0;
  const baslangic=Date.now();

  // 400'lük batch'lerle güncelle
  const BATCH=400;
  for(let i=0; i<docs.length; i+=BATCH) {
    const batch=db.batch();
    let batchSayac=0;
    docs.slice(i,i+BATCH).forEach(doc => {
      const r=doc.data();
      const isim=(r.AD_SOYAD||r.ISIM_SOYISIM||'').trim().toUpperCase();
      const hizmet=(r.HIZMET||r['HİZMET']||'').trim();
      const key=isim+'|'+hizmet;
      const yeniDurum=DURUM_MAP[key]||DURUM_MAP[isim];
      if(yeniDurum && (!r.DURUM || r.DURUM.trim()==='')) {
        batch.update(doc.ref, {DURUM: yeniDurum});
        guncellenen++; batchSayac++;
      } else { atlan++; }
    });
    if(batchSayac>0) await batch.commit();

    const pct=Math.round((i+BATCH)/toplam*100);
    bar.style.width=Math.min(pct,100)+'%';
    durum.textContent=`${i+BATCH>toplam?toplam:i+BATCH} / ${toplam} kayıt işlendi`;
    const gecen=(Date.now()-baslangic)/1000;
    const kalan=Math.ceil((toplam-(i+BATCH))/(((i+BATCH)||1)/gecen));
    if(i>0) sure.textContent=kalan>0?`Tahminen ${kalan} sn kaldı`:'';
  }

  bar.style.width='100%'; bar.style.background='#16a34a';
  durum.textContent='✅ Tamamlandı!'; sure.textContent='';
  document.getElementById('bitti').style.display='block';
  document.getElementById('bitti-msg').textContent=
    `${guncellenen} kayıt güncellendi, ${atlan} kayıt atlandı (zaten doluydu).`;
}
</script>
