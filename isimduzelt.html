<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>İsim Normalizasyonu</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #f8fafc; }
    h2 { color: #1A237E; }
    button { padding: 12px 28px; background: #1A237E; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; margin: 8px 4px; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    button.danger { background: #dc2626; }
    #log { margin-top: 20px; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 16px; max-height: 400px; overflow-y: auto; font-size: 13px; line-height: 1.8; }
    .ok { color: #16a34a; } .warn { color: #d97706; } .err { color: #dc2626; } .info { color: #1A237E; font-weight: 700; }
    #progress { font-size: 13px; color: #64748b; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>🔤 İsim Normalizasyonu — Türkçe Büyük Harf Düzeltme</h2>
  <p style="color:#475569;font-size:13px">
    Bu araç <code>vatandaslar</code> koleksiyonundaki <code>ISIM_SOYISIM</code> değerlerini Türkçe büyük harfe çevirir.<br>
    <b>Sorun:</b> Standart <code>toUpperCase()</code> ile kaydedilen isimler (ör: <code>SALIM → SALİM</code>) düzeltilir.
  </p>

  <button id="btn-analiz" onclick="analiz()">1. Analiz Et (Kaç Kayıt Farklı?)</button>
  <button id="btn-duzenle" onclick="duzenle()" disabled class="danger">2. Tüm İsimleri Düzelt (Firestore'a Yaz)</button>

  <div id="progress"></div>
  <div id="log"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="./firebase-config.js"></script>

  <script>
    const db = firebase.firestore();
    let _farklıKayitlar = [];

    function log(msg, cls='') {
      const el = document.getElementById('log');
      el.innerHTML += `<div class="${cls}">${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }
    function prog(msg) { document.getElementById('progress').textContent = msg; }

    /*
     * Türkçe büyük harf dönüşümü
     * 
     * SORUN: Standart JS .toUpperCase() ile yapılan dönüşümde:
     *   "salim"  → "SALIM"   (I oldu, İ olmalıydı)
     *   "ışık"   → "ISIK"    (I oldu, I doğru ama Ş kayboldu)
     *   "şeker"  → "SEKER"   (Ş → S oldu)
     * 
     * ÇÖZÜM: Önce Türkçe karakterleri büyüt, sonra toUpperCase()
     */
    function trUpper(str) {
      if (!str) return str;
      return str
        .replace(/i/g, 'İ')   // i → İ  (en kritik: İstanbul değil Istanbul)
        .replace(/ı/g, 'I')   // ı → I
        .replace(/ğ/g, 'Ğ')
        .replace(/ü/g, 'Ü')
        .replace(/ş/g, 'Ş')
        .replace(/ö/g, 'Ö')
        .replace(/ç/g, 'Ç')
        .toUpperCase();
    }

    /*
     * Bozuk büyük harften Türkçe büyük harfe düzeltme
     * 
     * Veri zaten büyük harf ama yanlış (ör: SALIM, IBRAHIM, SEREF)
     * Önce küçük harfe çevir, sonra Türkçe büyük harfe çevir.
     * 
     * Dikkat: toLocaleLowerCase('tr-TR') kullanılır ki
     * I → ı, İ → i doğru şekilde dönüşsün.
     */
    function duzeltBozukBuyuk(str) {
      if (!str) return str;

      // Zaten küçük harf içeriyorsa (karma yazım) direkt trUpper uygula
      if (/[a-zğüşöçıi]/.test(str)) {
        return trUpper(str);
      }

      // Tamamen büyük harf (bozuk kayıt) → manuel küçük harfe çevir
      // I harfini 'i' olarak alıyoruz çünkü Türkçe isimlerde I çoğunlukla İ'den gelir
      // (IBRAHIM → ibrahim → İBRAHİM, SALIM → salim → SALİM)
      const kucuk = str
        .replace(/I/g, 'i')   // I → i  (İ'den geldiğini varsay)
        .replace(/İ/g, 'i')   // İ zaten doğruysa da normalize et
        .replace(/Ğ/g, 'ğ')
        .replace(/Ü/g, 'ü')
        .replace(/Ş/g, 'ş')
        .replace(/Ö/g, 'ö')
        .replace(/Ç/g, 'ç')
        .toLowerCase();       // geri kalan ASCII harfler

      return trUpper(kucuk);  // i→İ, ğ→Ğ vb. doğru Türkçe büyük harf
    }

    async function analiz() {
      document.getElementById('btn-analiz').disabled = true;
      document.getElementById('log').innerHTML = '';
      _farklıKayitlar = [];
      log('🔍 Firestore\'dan kayıtlar alınıyor...', 'info');

      try {
        const snap = await db.collection('vatandaslar').get();
        log(`📦 Toplam ${snap.size} kayıt bulundu.`, 'info');

        let farkli = 0, ayni = 0;
        snap.forEach(doc => {
          const d = doc.data();
          const mevcut = d.ISIM_SOYISIM || '';
          const hedef  = duzeltBozukBuyuk(mevcut);
          if (mevcut !== hedef) {
            farkli++;
            _farklıKayitlar.push({ id: doc.id, mevcut, hedef });
            if (farkli <= 50) log(`⚠️ <b>${mevcut}</b> → <b>${hedef}</b>`, 'warn');
          } else {
            ayni++;
          }
        });

        if (farkli > 50) log(`... ve ${farkli - 50} kayıt daha`, 'warn');
        log(`✅ Aynı: ${ayni} kayıt`, 'ok');
        log(`⚠️ Düzeltilecek: ${farkli} kayıt`, farkli > 0 ? 'warn' : 'ok');

        if (farkli > 0) {
          document.getElementById('btn-duzenle').disabled = false;
          log(`👆 "Tüm İsimleri Düzelt" butonuna tıkla.`, 'info');
        } else {
          log('🎉 Tüm isimler zaten doğru — düzeltme gerekmez!', 'ok');
          document.getElementById('btn-analiz').disabled = false;
        }
      } catch(e) {
        log('❌ Hata: ' + e.message, 'err');
        document.getElementById('btn-analiz').disabled = false;
      }
    }

    async function duzenle() {
      if (!_farklıKayitlar.length) { log('⚠️ Önce analiz et.', 'warn'); return; }
      if (!confirm(`${_farklıKayitlar.length} kayıt Firestore'da güncellenecek. Emin misiniz?`)) return;

      document.getElementById('btn-duzenle').disabled = true;
      document.getElementById('btn-analiz').disabled = true;
      log('🚀 Güncelleme başlıyor...', 'info');

      const BATCH_SIZE = 400;
      let tamam = 0, hata = 0;

      for (let i = 0; i < _farklıKayitlar.length; i += BATCH_SIZE) {
        const grup = _farklıKayitlar.slice(i, i + BATCH_SIZE);
        const batch = db.batch();
        grup.forEach(({ id, hedef }) => {
          batch.update(db.collection('vatandaslar').doc(id), { ISIM_SOYISIM: hedef });
        });
        try {
          await batch.commit();
          tamam += grup.length;
          prog(`Güncellendi: ${tamam} / ${_farklıKayitlar.length}`);
        } catch(e) {
          hata += grup.length;
          log(`❌ Batch ${i}-${i+BATCH_SIZE} hatası: ` + e.message, 'err');
        }
      }

      log(`✅ Tamamlandı! ${tamam} kayıt güncellendi.${hata ? ' ' + hata + ' hatalı.' : ''}`, 'ok');
      prog('');
      document.getElementById('btn-analiz').disabled = false;
    }
  </script>
</body>
</html>
