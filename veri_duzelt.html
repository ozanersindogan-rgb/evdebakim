<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Veri Düzeltme — Yanlış Ay Tarihleri</title>
<style>
  body { font-family: sans-serif; padding: 24px; max-width: 900px; margin: 0 auto; background: #f8fafc; }
  h2 { color: #1e293b; }
  button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; margin: 6px 4px; }
  #btn-tara  { background: #3b82f6; color: #fff; }
  #btn-uygula { background: #ef4444; color: #fff; display: none; }
  #btn-uygula:disabled { background: #94a3b8; cursor: not-allowed; }
  #log { margin-top: 20px; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px; min-height: 100px; font-size: 13px; line-height: 1.8; }
  .item { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; }
  .item:last-child { border-bottom: none; }
  .warn  { color: #b45309; background: #fef9c3; border-radius: 4px; padding: 2px 6px; }
  .ok    { color: #15803d; }
  .err   { color: #dc2626; }
  .badge { background: #e0e7ff; color: #3730a3; border-radius: 4px; padding: 1px 6px; font-size: 11px; }
  #ozet  { background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; display: none; }
</style>
</head>
<body>

<h2>🔧 Yanlış Ay Tarihi Düzeltme</h2>
<p>Bu script, <strong>bir ayın kaydında (örn. NİSAN)</strong> başka aya ait tarih bulunduğunda<br>
o tarihi <strong>doğru ayın kaydına (örn. MART)</strong> taşır ve yanlış kayddaki tarih temizlenir.</p>

<button id="btn-tara" onclick="tara()">🔍 Sorunlu Kayıtları Tara</button>
<button id="btn-uygula" onclick="uygula()">✅ Düzeltmeyi Uygula</button>

<div id="ozet"></div>
<div id="log">Tarama başlatılmadı.</div>

<!-- Firebase — kendi projenin config'ini buraya yapıştır -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script>
// ── BURAYA KENDİ FIREBASE CONFIG'İNİ YAPISTIR ──
// evdebakim projesindeki firebase-config.js'den kopyala
const firebaseConfig = {
  // apiKey: "...",
  // authDomain: "...",
  // projectId: "...",
  // ...
};

// ── AY LİSTESİ ──
const AY_LISTESI = ['OCAK','ŞUBAT','MART','NİSAN','MAYIS','HAZİRAN','TEMMUZ','AĞUSTOS','EYLÜL','EKİM','KASIM','ARALIK'];

// DD.MM.YYYY → ay adı (AY_LISTESI'nden)
function tarihtenAy(tarihStr) {
  if (!tarihStr) return null;
  const parts = tarihStr.split('.');
  if (parts.length < 2) return null;
  const ayNo = parseInt(parts[1], 10) - 1;
  return AY_LISTESI[ayNo] || null;
}

const BANYO_ALANLARI = ['BANYO1','BANYO2','BANYO3','BANYO4','BANYO5'];
const KUAFOR_ALANLARI = ['SAC1','SAC2','TIRNAK1','TIRNAK2','SAKAL1','SAKAL2'];

let allData = [];
let islemListesi = []; // düzeltme planı

function log(html) {
  document.getElementById('log').innerHTML += html;
}
function logTemizle() {
  document.getElementById('log').innerHTML = '';
}

async function tara() {
  if (!firebase.apps.length) {
    try { firebase.initializeApp(firebaseConfig); }
    catch(e) { document.getElementById('log').innerHTML = '<span class="err">❌ Firebase başlatılamadı. Config eksik!</span>'; return; }
  }

  logTemizle();
  islemListesi = [];
  document.getElementById('btn-uygula').style.display = 'none';
  document.getElementById('ozet').style.display = 'none';
  log('⏳ Firestore\'dan veriler yükleniyor...<br>');

  try {
    const snap = await firebase.firestore().collection('vatandaslar').get();
    allData = snap.docs.map(d => ({ _fbId: d.id, ...d.data() }));
    log(`✅ ${allData.length} kayıt yüklendi.<br><br>`);
  } catch(e) {
    log(`<span class="err">❌ Yükleme hatası: ${e.message}</span>`);
    return;
  }

  // Her kayıt için tarih alanlarını kontrol et
  let sorunluSayac = 0;

  for (const kayit of allData) {
    const kayitAy = kayit.AY;
    if (!kayitAy) continue;

    const hizmet = kayit['HİZMET'] || '';
    const alanlar = hizmet === 'KUAFÖR' ? KUAFOR_ALANLARI : BANYO_ALANLARI;

    for (const alan of alanlar) {
      const tarih = kayit[alan];
      if (!tarih) continue;

      const tarihAy = tarihtenAy(tarih);
      if (!tarihAy || tarihAy === kayitAy) continue;

      // Yanlış ayda tarih var — doğru ayın kaydını bul
      const dogruKayit = allData.find(r =>
        r.ISIM_SOYISIM === kayit.ISIM_SOYISIM &&
        r['HİZMET'] === hizmet &&
        r.AY === tarihAy &&
        r._fbId !== kayit._fbId
      );

      sorunluSayac++;
      islemListesi.push({
        yanlisKayit: kayit,
        yanlisAlan: alan,
        tarih: tarih,
        tarihAy: tarihAy,
        kayitAy: kayitAy,
        dogruKayit: dogruKayit || null,
      });

      const dogruBilgi = dogruKayit
        ? `<span class="ok">→ ${tarihAy} kaydına taşınacak</span>`
        : `<span class="err">⚠️ ${tarihAy} kaydı bulunamadı — sadece temizlenecek</span>`;

      log(`<div class="item">
        <strong>${kayit.ISIM_SOYISIM}</strong>
        <span class="badge">${hizmet}</span>
        <span class="warn">${kayitAy} kaydında ${alan}=${tarih}</span>
        ${dogruBilgi}
      </div>`);
    }
  }

  if (sorunluSayac === 0) {
    log('<br><span class="ok">✅ Sorunlu kayıt bulunamadı! Veri temiz.</span>');
    return;
  }

  const ozet = document.getElementById('ozet');
  ozet.innerHTML = `<strong>${sorunluSayac} sorunlu alan bulundu.</strong> Aşağıdaki "Düzeltmeyi Uygula" butonuna tıklayarak düzeltebilirsiniz.`;
  ozet.style.display = 'block';
  document.getElementById('btn-uygula').style.display = 'inline-block';
}

async function uygula() {
  if (!islemListesi.length) return;
  const btn = document.getElementById('btn-uygula');
  btn.disabled = true;
  btn.textContent = '⏳ Uygulanıyor...';

  log('<br>──────────────────────────────<br>');
  log('🔄 Düzeltmeler uygulanıyor...<br><br>');

  let basarili = 0, basarisiz = 0;
  const db = firebase.firestore();

  for (const islem of islemListesi) {
    try {
      // 1) Yanlış kayıttaki alanı temizle
      await db.collection('vatandaslar').doc(islem.yanlisKayit._fbId).update({
        [islem.yanlisAlan]: ''
      });

      // 2) Doğru kayıt varsa uygun boş alana tarihi yaz
      if (islem.dogruKayit) {
        const hizmet = islem.dogruKayit['HİZMET'] || '';
        const alanlar = hizmet === 'KUAFÖR' ? KUAFOR_ALANLARI : BANYO_ALANLARI;
        const bosAlan = alanlar.find(f => !islem.dogruKayit[f]);
        if (bosAlan) {
          await db.collection('vatandaslar').doc(islem.dogruKayit._fbId).update({
            [bosAlan]: islem.tarih
          });
          log(`<div class="item ok">✅ ${islem.yanlisKayit.ISIM_SOYISIM} — ${islem.tarih} → ${islem.tarihAy} kaydı ${bosAlan} alanına yazıldı</div>`);
        } else {
          log(`<div class="item warn">⚠️ ${islem.yanlisKayit.ISIM_SOYISIM} — ${islem.tarihAy} kaydında boş alan yok, tarih eklenemedi ama yanlış kayıttan silindi</div>`);
        }
      } else {
        log(`<div class="item warn">⚠️ ${islem.yanlisKayit.ISIM_SOYISIM} — ${islem.tarihAy} kaydı bulunamadı, sadece yanlış kayıttan silindi</div>`);
      }

      basarili++;
    } catch(e) {
      basarisiz++;
      log(`<div class="item err">❌ ${islem.yanlisKayit.ISIM_SOYISIM} — Hata: ${e.message}</div>`);
    }
  }

  log(`<br><strong>Tamamlandı: ${basarili} başarılı, ${basarisiz} hatalı.</strong>`);
  btn.textContent = '✅ Tamamlandı';
}
</script>
</body>
</html>
