function log(msg, cls='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function startUpload() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const btn   = document.getElementById('btn');
  if(!email||!pass) { log('⚠️ E-posta ve şifre zorunlu','err'); return; }
  
  btn.disabled = true;
  btn.textContent = 'Yükleniyor...';
  log('Giriş yapılıyor...','info');

  try {
    await firebase.auth().signInWithEmailAndPassword(email, pass);
    log('✓ Giriş başarılı','ok');
  } catch(e) {
    log('✗ Giriş hatası: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '🚀 Yüklemeyi Başlat';
    return;
  }

  // Önce mevcut kayıt sayısını kontrol et
  const existing = await db.collection('vatandaslar').limit(1).get();
  if(!existing.empty) {
    log('⚠️ Firestore zaten veri içeriyor! Tekrar yüklemek ister misiniz?','err');
    if(!confirm('Firestore zaten veri içeriyor. Yine de eklemek istiyor musunuz?')) {
      btn.disabled=false; btn.textContent='🚀 Yüklemeyi Başlat'; return;
    }
  }

  log(`Toplam ${SEED.length} kayıt yüklenecek...`, 'info');
  
  const BATCH = 400; // Firestore batch limit 500
  let done = 0;
  
  for(let i=0; i<SEED.length; i+=BATCH) {
    const chunk = SEED.slice(i, i+BATCH);
    const batch = db.batch();
    chunk.forEach(rec => {
      const ref = db.collection('vatandaslar').doc();
      batch.set(ref, rec);
    });
    try {
      await batch.commit();
      done += chunk.length;
      log(`✓ ${done} / ${SEED.length} kayıt yüklendi`, 'ok');
    } catch(e) {
      log(`✗ Hata (kayıt ${i}-${i+BATCH}): ${e.message}`, 'err');
    }
  }

  if(done === SEED.length) {
    log(`🎉 Tüm ${SEED.length} kayıt başarıyla yüklendi!`, 'ok');
    log('Bu pencereyi kapatabilirsiniz.', 'info');
    btn.textContent = '✅ Tamamlandı';
  } else {
    log(`⚠️ ${done}/${SEED.length} kayıt yüklendi, bazı hatalar oluştu.`, 'err');
    btn.disabled = false; btn.textContent = '🔄 Tekrar Dene';
  }
}
