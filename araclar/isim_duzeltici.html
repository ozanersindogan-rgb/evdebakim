<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkçe İsim Düzeltici</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f13; font-family: 'Segoe UI', Tahoma, sans-serif; color: #e2e8f0; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

const VOWELS = {"A":"kalin","I":"kalin","O":"kalin","U":"kalin","E":"ince","İ":"ince","Ö":"ince","Ü":"ince"};

function detectIssues(word) {
  if (!word) return [];
  const up = word.toLocaleUpperCase("tr-TR");
  if (up !== word) return [];
  const issues = [];
  for (let i = 0; i < word.length; i++) {
    const ch = word[i];
    if (ch !== "I" && ch !== "İ") continue;
    let prev = null, next = null;
    for (let j = i-1; j >= 0; j--) if (VOWELS[word[j]]) { prev = word[j]; break; }
    for (let j = i+1; j < word.length; j++) if (VOWELS[word[j]]) { next = word[j]; break; }
    const ref = prev || next;
    if (!ref) continue;
    if (ch === "I" && VOWELS[ref] === "ince") issues.push({pos:i, type:"I→İ", original:"I", suggest:"İ"});
    else if (ch === "İ" && VOWELS[ref] === "kalin" && ref !== "İ") issues.push({pos:i, type:"İ→I", original:"İ", suggest:"I"});
  }
  return issues;
}

function suggestWord(word) {
  const issues = detectIssues(word);
  if (!issues.length) return null;
  const arr = word.split("");
  issues.forEach(iss => { arr[iss.pos] = iss.suggest; });
  return arr.join("");
}

function analyzeName(fullName) {
  const words = fullName.trim().toLocaleUpperCase("tr-TR").split(/\s+/);
  const suggestions = [];
  words.forEach((word, idx) => {
    const sugg = suggestWord(word);
    if (sugg && sugg !== word) suggestions.push({wordIdx:idx, original:word, suggested:sugg});
  });
  return suggestions;
}

function App() {
  const [input, setInput] = useState("");
  const [names, setNames] = useState([]);
  const [processed, setProcessed] = useState(false);
  const [copied, setCopied] = useState(false);

  const parseNames = useCallback(() => {
    const lines = input.split("\n").map(l => l.trim().toLocaleUpperCase("tr-TR")).filter(Boolean);
    const parsed = lines.map((line, i) => {
      const suggs = analyzeName(line);
      return {id:i, original:line, current:line, suggestions:suggs, changed:false};
    });
    setNames(parsed);
    setProcessed(true);
  }, [input]);

  const applySuggestion = (nameId, wordIdx, suggested) => {
    setNames(prev => prev.map(n => {
      if (n.id !== nameId) return n;
      const words = n.current.split(/\s+/);
      words[wordIdx] = suggested;
      const newCurrent = words.join(" ");
      const newSuggs = n.suggestions.filter(s => s.wordIdx !== wordIdx);
      return {...n, current:newCurrent, suggestions:newSuggs, changed:newCurrent !== n.original};
    }));
  };

  const rejectSuggestion = (nameId, wordIdx) => {
    setNames(prev => prev.map(n => {
      if (n.id !== nameId) return n;
      return {...n, suggestions:n.suggestions.filter(s => s.wordIdx !== wordIdx)};
    }));
  };

  const manualEdit = (nameId, val) => {
    setNames(prev => prev.map(n => {
      if (n.id !== nameId) return n;
      const upper = val.toLocaleUpperCase("tr-TR");
      return {...n, current:upper, changed:upper !== n.original};
    }));
  };

  const copyAll = () => {
    const text = names.map(n => n.current).join("\n");
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const pendingCount = names.filter(n => n.suggestions.length > 0).length;
  const changedCount = names.filter(n => n.changed).length;

  if (!processed) return (
    <div style={{minHeight:"100vh",padding:"32px 24px",maxWidth:760,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:32}}>
        <div style={{width:52,height:52,background:"linear-gradient(135deg,#e53e3e,#fc8181)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:900,color:"#fff"}}>Ş</div>
        <div>
          <div style={{fontSize:22,fontWeight:900,color:"#fff",letterSpacing:"-0.5px"}}>Türkçe İsim Düzeltici</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:3}}>I / İ karakter hatalarını otomatik tespit & düzelt</div>
        </div>
      </div>
      <div style={{background:"#1a1a2e",border:"1.5px solid #2d3748",borderRadius:16,padding:22,marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>İsimleri buraya yapıştırın — her satıra bir isim</div>
        <textarea value={input} onChange={e => setInput(e.target.value)}
          placeholder={"OZAN KİRİCİ\nAYŞE DEMIR\nMEHMET YILDIZ"} rows={10}
          style={{width:"100%",background:"#0f0f13",border:"1.5px solid #2d3748",borderRadius:10,color:"#e2e8f0",fontSize:14,padding:"12px 14px",fontFamily:"monospace",resize:"vertical",lineHeight:1.8,outline:"none"}}
        />
        <div style={{fontSize:11,color:"#475569",marginTop:8}}>{input.split("\n").filter(l=>l.trim()).length} isim girildi</div>
      </div>
      <button onClick={parseNames} disabled={!input.trim()}
        style={{background:input.trim()?"linear-gradient(135deg,#e53e3e,#c53030)":"#1a1a2e",color:input.trim()?"#fff":"#4a5568",border:input.trim()?"none":"1.5px solid #2d3748",borderRadius:12,padding:"13px 36px",fontSize:14,fontWeight:800,cursor:input.trim()?"pointer":"not-allowed"}}>
        Analiz Et →
      </button>
      <div style={{marginTop:28,background:"#141418",border:"1px solid #2d3748",borderRadius:12,padding:"16px 20px"}}>
        <div style={{fontSize:11,fontWeight:800,color:"#475569",marginBottom:10,textTransform:"uppercase"}}>Nasıl çalışır</div>
        <div style={{fontSize:13,color:"#64748b",lineHeight:1.9}}>
          • Sesli uyumu kuralına göre <span style={{color:"#fc8181",fontWeight:700}}>I → İ</span> ve <span style={{color:"#68d391",fontWeight:700}}>İ → I</span> hatalarını tespit eder<br/>
          • Her öneriyi tek tek <b style={{color:"#e2e8f0"}}>Evet</b> veya <b style={{color:"#e2e8f0"}}>Hayır</b> ile değerlendirirsiniz<br/>
          • İstediğiniz ismi elle de düzenleyebilirsiniz<br/>
          • Sonunda tüm düzeltilmiş isimleri panoya kopyalarsınız
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",padding:"24px",maxWidth:860,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{fontSize:20,fontWeight:900,color:"#fff"}}>İsim Düzeltici</div>
          <div style={{background:pendingCount>0?"#2d1a1a":"#0f1f0f",border:`1.5px solid ${pendingCount>0?"#e53e3e":"#38a169"}`,borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,color:pendingCount>0?"#fc8181":"#68d391"}}>
            {pendingCount>0?`⚠ ${pendingCount} bekleyen`:"✓ Tamamlandı"}
          </div>
          {changedCount>0&&<div style={{background:"#0f1a2d",border:"1.5px solid #3182ce",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,color:"#63b3ed"}}>{changedCount} değişti</div>}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>{setProcessed(false);setNames([]);}} style={{background:"#1a1a2e",border:"1.5px solid #2d3748",color:"#94a3b8",borderRadius:10,padding:"9px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>← Geri</button>
          <button onClick={copyAll} style={{background:copied?"linear-gradient(135deg,#276749,#48bb78)":"linear-gradient(135deg,#276749,#38a169)",border:"none",color:"#fff",borderRadius:10,padding:"9px 22px",fontSize:13,fontWeight:800,cursor:"pointer"}}>
            {copied?"✓ Kopyalandı!":"Tümünü Kopyala"}
          </button>
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {names.map(n => (
          <div key={n.id} style={{background:n.suggestions.length>0?"#1a0f1a":n.changed?"#0f1a0f":"#141418",border:`1.5px solid ${n.suggestions.length>0?"#702459":n.changed?"#276749":"#2d3748"}`,borderRadius:12,padding:"12px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <div style={{width:26,height:26,borderRadius:7,background:"#2d3748",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#94a3b8",flexShrink:0}}>{n.id+1}</div>
              <input value={n.current} onChange={e=>manualEdit(n.id,e.target.value)}
                style={{flex:1,background:"transparent",border:"none",color:n.changed?"#68d391":"#e2e8f0",fontSize:15,fontWeight:800,fontFamily:"monospace",letterSpacing:"0.04em",minWidth:140,outline:"none"}}
              />
              <div style={{fontSize:11,flexShrink:0,color:n.suggestions.length>0?"#f687b3":n.changed?"#68d391":"#4a5568"}}>
                {n.suggestions.length>0?"● Öneri var":n.changed?"✓ Değiştirildi":"— Sorun yok"}
              </div>
            </div>
            {n.suggestions.map(s => (
              <div key={s.wordIdx} style={{marginTop:10,background:"#0f0f13",border:"1px solid #702459",borderRadius:9,padding:"10px 14px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <div style={{flex:1,fontSize:13,minWidth:120}}>
                  <span style={{color:"#94a3b8"}}>Öneri: </span>
                  <span style={{color:"#fc8181",fontFamily:"monospace",fontWeight:700}}>{s.original}</span>
                  <span style={{margin:"0 8px",color:"#4a5568"}}>→</span>
                  <span style={{color:"#68d391",fontFamily:"monospace",fontWeight:700}}>{s.suggested}</span>
                  <span style={{marginLeft:8,color:"#64748b",fontSize:11}}>({s.type==="I→İ"?"I yerine İ":"İ yerine I"})</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>applySuggestion(n.id,s.wordIdx,s.suggested)} style={{background:"linear-gradient(135deg,#276749,#38a169)",border:"none",color:"#fff",borderRadius:8,padding:"7px 16px",fontSize:12,fontWeight:800,cursor:"pointer"}}>Evet, Düzelt</button>
                  <button onClick={()=>rejectSuggestion(n.id,s.wordIdx)} style={{background:"#2d3748",border:"1px solid #4a5568",color:"#94a3b8",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Hayır</button>
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>

      {names.length>6&&(
        <div style={{textAlign:"center",marginTop:20}}>
          <button onClick={copyAll} style={{background:copied?"linear-gradient(135deg,#276749,#48bb78)":"linear-gradient(135deg,#276749,#38a169)",border:"none",color:"#fff",borderRadius:12,padding:"13px 36px",fontSize:14,fontWeight:800,cursor:"pointer"}}>
            {copied?`✓ Kopyalandı!`:`Tümünü Kopyala (${names.length} isim)`}
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
