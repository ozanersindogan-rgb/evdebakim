<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Veri Düzeltme — Yanlış Ay Tarihleri</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; padding: 24px; max-width: 980px; margin: 0 auto; background: #f8fafc; color: #1e293b; }
  h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  p.aciklama { font-size: 13px; color: #475569; margin-bottom: 16px; }

  #login-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 32px; max-width: 360px; margin: 60px auto; }
  #login-box h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; text-align: center; }
  #login-box input { width: 100%; padding: 9px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px; margin-bottom: 12px; outline: none; font-family: sans-serif; }
  #login-box input:focus { border-color: #3b82f6; }
  #btn-giris { width: 100%; padding: 10px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: sans-serif; }
  #btn-giris:hover { background: #2563eb; }
  #btn-giris:disabled { background: #93c5fd; cursor: not-allowed; }
  #login-err { color: #dc2626; font-size: 12px; margin-top: 10px; min-height: 18px; text-align: center; }

  #main-box { display: none; }
  .user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 13px; color: #64748b; }
  #btn-cikis { font-size: 12px; padding: 5px 12px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fff; cursor: pointer; color: #64748b; font-family: sans-serif; }
  #btn-cikis:hover { background: #f1f5f9; }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .btn { font-family: sans-serif; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 8px; border: 1.5px solid #cbd5e1; background: #fff; color: #1e293b; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: #f1f5f9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #btn-tara { border-color: #3b82f6; color: #1d4ed8; }
  #btn-uygula { border-color: #ef4444; color: #b91c1c; }
  #btn-tumunu-sec { border-color: #22c55e; color: #15803d; font-size: 12px; padding: 6px 12px; }

  .filtre-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .filtre-tab { font-family: sans-serif; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 99px; border: 1.5px solid #e2e8f0; background: #fff; color: #64748b; cursor: pointer; transition: all 0.15s; }
  .filtre-tab:hover { border-color: #94a3b8; color: #1e293b; }
  .filtre-tab.aktif { background: #1e293b; color: #fff; border-color: #1e293b; }
  .filtre-tab .sayi { font-size: 11px; margin-left: 4px; opacity: 0.7; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 14px; }
  .stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; }
  .stat-label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 600; color: #1e293b; }

  #log { font-size: 13px; color: #64748b; margin-bottom: 10px; min-height: 20px; }

  .list { display: flex; flex-direction: column; gap: 6px; }
  .kayit-kart { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; display: grid; grid-template-columns: 22px 1fr auto; gap: 10px; align-items: center; }
  .kayit-kart.gizli { display: none; }
  .kayit-kart:hover { border-color: #94a3b8; }
  .kayit-kart input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #3b82f6; }
  .kayit-info { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .isim { font-size: 13px; font-weight: 600; color: #1e293b; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
  .b-banyo    { background: #dbeafe; color: #1e40af; }
  .b-kuafor   { background: #ede9fe; color: #5b21b6; }
  .b-temizlik { background: #d1fae5; color: #065f46; }
  .b-yanlis   { background: #fee2e2; color: #991b1b; }
  .b-dogru    { background: #dcfce7; color: #166534; }
  .b-olustur  { background: #fef3c7; color: #92400e; }
  .ok-arrow   { font-size: 13px; color: #94a3b8; }
  .sonuc-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; white-space: nowrap; }
  .s-ok      { background: #dcfce7; color: #166534; }
  .s-olustur { background: #fef3c7; color: #92400e; }
  .s-warn    { background: #fef9c3; color: #854d0e; }
  .s-err     { background: #fee2e2; color: #991b1b; }
  .empty { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }

  /* Debug paneli */
  #debug-box { background: #1e293b; color: #94a3b8; font-family: monospace; font-size: 11px; border-radius: 8px; padding: 12px 16px; margin-bottom: 14px; max-height: 180px; overflow-y: auto; display: none; }
  #btn-debug { border-color: #94a3b8; color: #64748b; font-size: 11px; padding: 5px 10px; }
</style>
</head>
<body>

<!-- GİRİŞ -->
<div id="login-box">
  <h3>🔐 Giriş Yap</h3>
  <input type="email" id="inp-email" placeholder="E-posta" autocomplete="email"/>
  <input type="password" id="inp-sifre" placeholder="Şifre" autocomplete="current-password"/>
  <button id="btn-giris" onclick="girisYap()">Giriş Yap</button>
  <div id="login-err"></div>
</div>

<!-- ANA EKRAN -->
<div id="main-box">
  <h2>🔧 Yanlış Ay Tarihi Düzeltme</h2>
  <p class="aciklama">Herhangi bir ayın kaydında başka aya ait tarih varsa tespit eder. Hedef kayıt yoksa otomatik oluşturulur.</p>

  <div class="user-bar">
    <span id="user-label"></span>
    <button id="btn-cikis" onclick="cikisYap()">Çıkış Yap</button>
  </div>

  <div id="log">Tarama başlatılmadı.</div>

  <div class="toolbar">
    <button class="btn" id="btn-tara" onclick="tara()">🔍 Tara</button>
    <button class="btn" id="btn-tumunu-sec" onclick="tumunuSec()" style="display:none">Tümünü seç / kaldır</button>
    <button class="btn" id="btn-uygula" onclick="uygula()" style="display:none" disabled>✅ Seçilenleri düzelt</button>
    <button class="btn" id="btn-debug" onclick="toggleDebug()">🔎 Alan adlarını göster</button>
  </div>

  <!-- DEBUG: ilk kayıttaki alan adlarını gösterir -->
  <div id="debug-box"></div>

  <div class="filtre-bar" id="filtre-bar" style="display:none">
    <button class="filtre-tab aktif" data-filtre="TUMU" onclick="filtreUygula(this)">Tümü <span class="sayi" id="f-tumu">0</span></button>
    <button class="filtre-tab" data-filtre="BANYO" onclick="filtreUygula(this)">🛁 Banyo <span class="sayi" id="f-banyo">0</span></button>
    <button class="filtre-tab" data-filtre="KUAFÖR" onclick="filtreUygula(this)">✂️ Kuaför <span class="sayi" id="f-kuafor">0</span></button>
    <button class="filtre-tab" data-filtre="TEMİZLİK" onclick="filtreUygula(this)">🧹 Temizlik <span class="sayi" id="f-temizlik">0</span></button>
  </div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-label">Toplam kayıt</div><div class="stat-val" id="s-toplam">0</div></div>
    <div class="stat"><div class="stat-label">Sorunlu alan</div><div class="stat-val" id="s-sorunlu">0</div></div>
    <div class="stat"><div class="stat-label">Görüntülenen</div><div class="stat-val" id="s-gosterilen">0</div></div>
    <div class="stat"><div class="stat-label">Seçili</div><div class="stat-val" id="s-secili">0</div></div>
  </div>

  <div class="list" id="liste"></div>
</div>

const auth = firebase.auth();
const db   = firebase.firestore();

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('main-box').style.display  = 'block';
    document.getElementById('user-label').textContent  = '👤 ' + user.email;

async function girisYap() {
  const email = document.getElementById('inp-email').value.trim();
  const sifre = document.getElementById('inp-sifre').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  if (!email || !sifre) { errEl.textContent = 'E-posta ve şifre gerekli.'; return; }
  const btn = document.getElementById('btn-giris');
  btn.textContent = 'Giriş yapılıyor...'; btn.disabled = true;
  try {
    await auth.signInWithEmailAndPassword(email, sifre);
  } catch(e) {
    let msg = 'Giriş başarısız.';
    if (['auth/user-not-found','auth/wrong-password','auth/invalid-credential'].includes(e.code)) msg = 'E-posta veya şifre hatalı.';
    else if (e.code === 'auth/too-many-requests') msg = 'Çok fazla deneme. Lütfen bekleyin.';
    errEl.textContent = msg;
    btn.textContent = 'Giriş Yap'; btn.disabled = false;
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-box').style.display !== 'none') girisYap();
});
function cikisYap() { auth.signOut(); }

// ── SABİTLER ──
const AY_LISTESI = ['OCAK','ŞUBAT','MART','NİSAN','MAYIS','HAZİRAN','TEMMUZ','AĞUSTOS','EYLÜL','EKİM','KASIM','ARALIK'];

// Gerçek alan adları — Firestore'daki gibi (BANYO1..5, TIRNAK1..3, SAC1..2, SAKAL1..2, TEMIZLIK1..5)
const BANYO_ALANLARI    = [1,2,3,4,5].map(n => 'BANYO' + n);
const KUAFOR_ALANLARI   = [
  ...[1,2,3].map(n => 'TIRNAK' + n),
  ...[1,2].map(n => 'SAC' + n),
  ...[1,2].map(n => 'SAKAL' + n),
];
const TEMIZLIK_ALANLARI = [1,2,3,4,5].map(n => 'TEMIZLIK' + n);
const TUM_TARIH_ALANLARI = [...BANYO_ALANLARI, ...KUAFOR_ALANLARI, ...TEMIZLIK_ALANLARI];

let islemListesi = [], tumData = [], aktifFiltre = 'TUMU';

// Kayıttaki HİZMET alanına göre hangi alan grubunu tarıyacağız
function hizmetAlanlari(hizmet) {
  if (!hizmet) return BANYO_ALANLARI;
  const h = hizmet.toUpperCase();
  if (h.includes('KUAF')) return KUAFOR_ALANLARI;
  if (h.includes('TEM'))  return TEMIZLIK_ALANLARI;
  return BANYO_ALANLARI;
}

// Tüm tarih alanlarını tara (HİZMET alanından bağımsız — bazı kayıtlarda HİZMET eksik olabilir)
function kayittakiTarihAlanlari(kayit) {
  return TUM_TARIH_ALANLARI.filter(alan => kayit[alan]);
}

function hizmetSinifi(alan) {
  if (KUAFOR_ALANLARI.includes(alan)) return 'b-kuafor';
  if (TEMIZLIK_ALANLARI.includes(alan)) return 'b-temizlik';
  return 'b-banyo';
}

function hizmetFiltresiAlan(alan) {
  if (KUAFOR_ALANLARI.includes(alan)) return 'KUAFÖR';
  if (TEMIZLIK_ALANLARI.includes(alan)) return 'TEMİZLİK';
  return 'BANYO';
}

function ilgiliAlanListesi(alan) {
  if (KUAFOR_ALANLARI.includes(alan)) return KUAFOR_ALANLARI;
  if (TEMIZLIK_ALANLARI.includes(alan)) return TEMIZLIK_ALANLARI;
  return BANYO_ALANLARI;
}

function hizmetEtiketiAlan(alan) {
  if (KUAFOR_ALANLARI.includes(alan)) return 'KUAFÖR';
  if (TEMIZLIK_ALANLARI.includes(alan)) return 'TEMİZLİK';
  return 'BANYO';
}

function tarihtenAy(str) {
  if (!str) return null;
  const s = String(str).trim();
  let ay = null;
  if (s.includes('-')) {
    // ISO format: 2026-02-25
    const p = s.split('-');
    ay = p.length >= 2 ? parseInt(p[1], 10) : null;
  } else if (s.includes('.')) {
    // DD.MM.YYYY format: 25.02.2026
    const p = s.split('.');
    ay = p.length >= 2 ? parseInt(p[1], 10) : null;
  }
  if (!ay || ay < 1 || ay > 12) return null;
  return AY_LISTESI[ay - 1];
}

function setLog(txt) { document.getElementById('log').textContent = txt; }

// Debug: ilk birkaç kaydın alan adlarını göster
function toggleDebug() {
  const box = document.getElementById('debug-box');
  if (box.style.display === 'none' || box.style.display === '') {
    if (tumData.length === 0) { box.style.display = 'block'; box.textContent = 'Önce Tara butonuna basın.'; return; }
    let out = '';
    tumData.slice(0, 3).forEach((k, i) => {
      out += '── Kayıt ' + (i+1) + ': ' + (k.ISIM_SOYISIM || k['İSİM SOYİSİM'] || '?') + ' ──\n';
      Object.keys(k).filter(f => f !== '_fbId').forEach(f => {
        out += '  ' + f + ': ' + k[f] + '\n';
      });
      out += '\n';
    });
    box.textContent = out;
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
  }
}

function istatistikGuncelle() {
  const tumSecili = document.querySelectorAll('.kayit-cb:checked').length;
  document.getElementById('s-secili').textContent = tumSecili;
  document.getElementById('btn-uygula').disabled = tumSecili === 0;
}

function tumunuSec() {
  const gorunenler = [...document.querySelectorAll('.kayit-kart:not(.gizli) .kayit-cb')];
  const hepsi = gorunenler.every(b => b.checked);
  gorunenler.forEach(b => b.checked = !hepsi);
  istatistikGuncelle();
}

function filtreUygula(el) {
  document.querySelectorAll('.filtre-tab').forEach(t => t.classList.remove('aktif'));
  el.classList.add('aktif');
  aktifFiltre = el.dataset.filtre;
  let gosterilen = 0;
  document.querySelectorAll('.kayit-kart').forEach(kart => {
    const gizle = aktifFiltre !== 'TUMU' && kart.dataset.hizmet !== aktifFiltre;
    kart.classList.toggle('gizli', gizle);
    if (!gizle) gosterilen++;
  });
  document.getElementById('s-gosterilen').textContent = gosterilen;
  istatistikGuncelle();
}

async function tara() {
  document.getElementById('btn-tara').disabled = true;
  document.getElementById('btn-uygula').style.display = 'none';
  document.getElementById('btn-tumunu-sec').style.display = 'none';
  document.getElementById('stats').style.display = 'none';
  document.getElementById('filtre-bar').style.display = 'none';
  document.getElementById('liste').innerHTML = '';
  document.getElementById('debug-box').style.display = 'none';
  islemListesi = [];
  aktifFiltre = 'TUMU';

  setLog('Firestore\'dan yükleniyor...');

  try {
    const snap = await db.collection('vatandaslar').get();
    tumData = snap.docs.map(d => ({ _fbId: d.id, ...d.data() }));
  } catch(e) {
    setLog('Hata: ' + e.message);
    document.getElementById('btn-tara').disabled = false;
    return;
  }

  setLog(tumData.length + ' kayıt yüklendi. Analiz ediliyor...');

  // AY alan adını bul (büyük/küçük harf farklılığına karşı)
  const ayAlanAdi = tumData.length > 0
    ? Object.keys(tumData[0]).find(k => k.toUpperCase() === 'AY') || 'AY'
    : 'AY';

  // ISIM_SOYISIM alan adını bul (tüm kayıtlarda tutarlı olsun diye ilk dolu kaydı kullan)
  let isimAlanAdi = 'ISIM_SOYISIM';
  for (const k of tumData) {
    const bulunan = Object.keys(k).find(f =>
      f.replace(/[_\s]/g,'').toUpperCase() === 'ISIMSOYISIM' ||
      f.replace(/[_\s]/g,'').toUpperCase() === 'İSİMSOYİSİM'
    );
    if (bulunan) { isimAlanAdi = bulunan; break; }
  }

  for (const kayit of tumData) {
    const kayitAy = kayit[ayAlanAdi];
    if (!kayitAy) continue;

    // Tüm tarih alanlarını tara
    for (const alan of TUM_TARIH_ALANLARI) {
      const tarih = kayit[alan];
      if (!tarih) continue;
      const tarihAy = tarihtenAy(tarih);
      if (!tarihAy || tarihAy === kayitAy) continue;

      // Doğru ay kaydını bul
      const dogruKayit = tumData.find(r =>
        r[isimAlanAdi] === kayit[isimAlanAdi] &&
        r[ayAlanAdi] === tarihAy &&
        r._fbId !== kayit._fbId
      ) || null;

      // Eğer hedef kayıt zaten bu tarihi içeriyorsa — yanlış pozitif, atla
      if (dogruKayit) {
        const hedefAlanlar = ilgiliAlanListesi(alan);
        const zatenVar = hedefAlanlar.some(f => dogruKayit[f] === tarih);
        if (zatenVar) continue;
      }

      islemListesi.push({
        kayit, alan, tarih, tarihAy,
        kayitAy, dogruKayit,
        isimAlanAdi, ayAlanAdi,
        hizmetFiltre: hizmetFiltresiAlan(alan)
      });
    }
  }

  const sayiBanyo    = islemListesi.filter(i => i.hizmetFiltre === 'BANYO').length;
  const sayiKuafor   = islemListesi.filter(i => i.hizmetFiltre === 'KUAFÖR').length;
  const sayiTemizlik = islemListesi.filter(i => i.hizmetFiltre === 'TEMİZLİK').length;
  document.getElementById('f-tumu').textContent     = islemListesi.length;
  document.getElementById('f-banyo').textContent    = sayiBanyo;
  document.getElementById('f-kuafor').textContent   = sayiKuafor;
  document.getElementById('f-temizlik').textContent = sayiTemizlik;

  document.getElementById('s-toplam').textContent     = tumData.length;
  document.getElementById('s-sorunlu').textContent    = islemListesi.length;
  document.getElementById('s-gosterilen').textContent = islemListesi.length;
  document.getElementById('s-secili').textContent     = 0;
  document.getElementById('stats').style.display = 'grid';

  const liste = document.getElementById('liste');

  if (islemListesi.length === 0) {
    liste.innerHTML = '<div class="empty">✅ Sorunlu kayıt bulunamadı. Veri temiz görünüyor.<br><small style="color:#cbd5e1">Emin değilseniz "Alan adlarını göster" butonuna tıklayın.</small></div>';
    setLog('Tarama tamamlandı.');
    document.getElementById('btn-tara').disabled = false;
    return;
  }

  islemListesi.forEach((islem, i) => {
    const hedefMetin = islem.dogruKayit
      ? '<span class="badge b-dogru">' + islem.tarihAy + ' kaydına taşınacak</span>'
      : '<span class="badge b-olustur">' + islem.tarihAy + ' kaydı oluşturulup taşınacak</span>';

    const kart = document.createElement('div');
    kart.className = 'kayit-kart';
    kart.dataset.hizmet = islem.hizmetFiltre;
    kart.innerHTML =
      '<input type="checkbox" class="kayit-cb" data-idx="' + i + '" onchange="istatistikGuncelle()" checked>' +
      '<div><div class="kayit-info">' +
        '<span class="isim">' + (islem.kayit[islem.isimAlanAdi] || '—') + '</span>' +
        '<span class="badge ' + hizmetSinifi(islem.alan) + '">' + hizmetEtiketiAlan(islem.alan) + '</span>' +
        '<span class="badge b-yanlis">' + islem.kayitAy + ' / ' + islem.alan + ' = ' + islem.tarih + '</span>' +
        '<span class="ok-arrow">→</span>' +
        hedefMetin +
      '</div></div>' +
      '<div id="sonuc-' + i + '"></div>';
    liste.appendChild(kart);
  });

  document.querySelectorAll('.filtre-tab').forEach(t => t.classList.remove('aktif'));
  document.querySelector('.filtre-tab[data-filtre="TUMU"]').classList.add('aktif');
  document.getElementById('filtre-bar').style.display = 'flex';
  istatistikGuncelle();
  document.getElementById('btn-uygula').style.display = 'inline-block';
  document.getElementById('btn-tumunu-sec').style.display = 'inline-block';
  setLog(islemListesi.length + ' sorunlu alan bulundu. Filtreleyin, seçin ve düzeltin.');
  document.getElementById('btn-tara').disabled = false;
}

async function uygula() {
  const seciliIdx = [...document.querySelectorAll('.kayit-cb:checked')].map(b => parseInt(b.dataset.idx));
  if (!seciliIdx.length) return;

  document.getElementById('btn-uygula').disabled = true;
  document.getElementById('btn-uygula').textContent = '⏳ Uygulanıyor...';
  document.getElementById('btn-tara').disabled = true;

  let basarili = 0, basarisiz = 0;

  for (const idx of seciliIdx) {
    const islem = islemListesi[idx];
    const sonucEl = document.getElementById('sonuc-' + idx);

    try {
      // 1) Yanlış kayıttaki alanı temizle
      await db.collection('vatandaslar').doc(islem.kayit._fbId).update({ [islem.alan]: '' });

      let hedef = islem.dogruKayit;

      // 2) Hedef kayıt yoksa oluştur
      if (!hedef) {
        const yeniData = {};
        for (const [k, v] of Object.entries(islem.kayit)) {
          if (k === '_fbId') continue;
          yeniData[k] = TUM_TARIH_ALANLARI.includes(k) ? '' : v;
        }
        yeniData[islem.ayAlanAdi] = islem.tarihAy;

        const yeniRef = await db.collection('vatandaslar').add(yeniData);
        hedef = { _fbId: yeniRef.id, ...yeniData };
        tumData.push(hedef);
      }

      // 3) Hedef kayıttaki uygun boş alana tarihi yaz
      const alanlar = ilgiliAlanListesi(islem.alan);
      const bosAlan = alanlar.find(f => !hedef[f]);
      if (bosAlan) {
        await db.collection('vatandaslar').doc(hedef._fbId).update({ [bosAlan]: islem.tarih });
        const etiket = islem.dogruKayit ? '✅ Taşındı' : '✅ Kayıt oluşturuldu & taşındı';
        sonucEl.innerHTML = '<span class="sonuc-badge ' + (islem.dogruKayit ? 's-ok' : 's-olustur') + '">' + etiket + '</span>';
      } else {
        sonucEl.innerHTML = '<span class="sonuc-badge s-warn">⚠️ Silindi (hedefte boş alan yok)</span>';
      }
      basarili++;
    } catch(e) {
      sonucEl.innerHTML = '<span class="sonuc-badge s-err">❌ ' + e.message + '</span>';
      basarisiz++;
    }
  }

  setLog('Tamamlandı: ' + basarili + ' başarılı, ' + basarisiz + ' hatalı.');
  document.getElementById('btn-uygula').textContent = '✅ Seçilenleri düzelt';
  document.getElementById('btn-uygula').disabled = false;
  document.getElementById('btn-tara').disabled = false;
  istatistikGuncelle();
}
</script>
</body>
</html>
