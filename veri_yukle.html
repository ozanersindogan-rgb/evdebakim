<title>Veri Yükleme Aracı</title>

<style>
  body { font-family: system-ui; background: #f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  .kart { background:#fff; border-radius:20px; padding:32px; max-width:480px; width:90%; box-shadow:0 8px 40px rgba(0,0,0,.12); text-align:center; }
  h2 { color:#1e293b; margin:0 0 8px; font-size:20px; }
  p { color:#64748b; font-size:13px; margin:0 0 16px; }
  input { width:100%; box-sizing:border-box; padding:12px 14px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:14px; margin-bottom:10px; outline:none; }
  input:focus { border-color:#1d4ed8; }
  .btn { background:#1d4ed8; color:#fff; border:none; border-radius:12px; padding:14px 32px; font-size:15px; font-weight:800; cursor:pointer; width:100%; margin-top:4px; }
  .btn:disabled { background:#94a3b8; cursor:not-allowed; }
  .btn.green { background:#16a34a; }
  .progress { background:#e2e8f0; border-radius:99px; height:12px; margin:20px 0 8px; overflow:hidden; }
  .progress-bar { height:100%; background:linear-gradient(90deg,#1d4ed8,#6366f1); border-radius:99px; transition:width .3s; width:0%; }
  .durum { font-size:13px; color:#475569; min-height:20px; }
  .sure { font-size:12px; color:#94a3b8; margin-top:4px; }
  .bitti { background:#f0fdf4; border:2px solid #86efac; border-radius:12px; padding:16px; margin-top:20px; display:none; }
  .bitti h3 { color:#16a34a; margin:0 0 4px; }
  .hata { background:#fef2f2; border:2px solid #fca5a5; border-radius:12px; padding:12px; margin-top:12px; font-size:12px; color:#dc2626; display:none; text-align:left; }
  #giris-bolum { } 
  #yukle-bolum { display:none; }
</style>
</head>
<body>
<div class="kart">
  <h2>📥 Veri Yükleme Aracı</h2>

  <!-- GİRİŞ BÖLÜMÜ -->
  <div id="giris-bolum">
    <p>Firestore'a yazabilmek için sisteme giriş yapın.</p>
    <input type="email" id="email" placeholder="E-posta adresiniz" />
    <input type="password" id="sifre" placeholder="Şifreniz" onkeydown="if(event.key==='Enter')girisYap()" />
    <button class="btn" id="giris-btn" onclick="girisYap()">🔐 Giriş Yap</button>
    <div class="hata" id="giris-hata"></div>
  </div>

  <!-- YÜKLEME BÖLÜMÜ -->
  <div id="yukle-bolum">
    <p>Giriş yapıldı ✅<br>Yedekten çıkarılmış <strong>1.543 tekil kayıt</strong> yüklenecek.<br>
    Banyo/temizlik tarihleri temizlenmiş, sadece kişi bilgileri var.</p>
    <div class="progress"><div class="progress-bar" id="bar"></div></div>
    <div class="durum" id="durum">Hazır — butona basın</div>
    <div class="sure" id="sure"></div>
    <button class="btn" id="yukle-btn" onclick="baslat()">🚀 Yüklemeyi Başlat</button>
    <div class="bitti" id="bitti">
      <h3>✅ Tamamlandı!</h3>
      <p id="bitti-mesaj"></p>
    </div>
    <div class="hata" id="yukle-hata"></div>
  </div>
</div>

async function girisYap() {
  const btn = document.getElementById('giris-btn');
  const hata = document.getElementById('giris-hata');
  hata.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Giriş yapılıyor...';
  try {
    const email = document.getElementById('email').value.trim();
    const sifre = document.getElementById('sifre').value;
    await auth.signInWithEmailAndPassword(email, sifre);
    document.getElementById('giris-bolum').style.display = 'none';
    document.getElementById('yukle-bolum').style.display = 'block';
  } catch(e) {
    hata.style.display = 'block';
    hata.textContent = 'Giriş hatası: ' + (e.message || e);
    btn.disabled = false;
    btn.textContent = '🔐 Giriş Yap';
  }
}

async function baslat() {
  const btn = document.getElementById('yukle-btn');
  const bar = document.getElementById('bar');
  const durum = document.getElementById('durum');
  const sure = document.getElementById('sure');
  const hata = document.getElementById('yukle-hata');
  hata.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Yükleniyor...';

  const toplam = KAYITLAR.length;
  let yuklenen = 0;
  const baslangic = Date.now();
  const BATCH = 400;

  try {
    for (let i = 0; i < KAYITLAR.length; i += BATCH) {
      const parca = KAYITLAR.slice(i, i + BATCH);
      const batch = db.batch();
      parca.forEach(r => batch.set(db.collection('vatandaslar').doc(), r));
      await batch.commit();
      yuklenen += parca.length;

      const pct = Math.round(yuklenen / toplam * 100);
      bar.style.width = pct + '%';
      durum.textContent = yuklenen + ' / ' + toplam + ' kayıt yüklendi';

      const gecen = (Date.now() - baslangic) / 1000;
      const kalan = Math.ceil((toplam - yuklenen) / (yuklenen / gecen));
      if (yuklenen > 10) {
        sure.textContent = kalan > 60
          ? 'Tahminen ' + Math.ceil(kalan/60) + ' dakika kaldı'
          : 'Tahminen ' + kalan + ' saniye kaldı';
      }
    }

    document.getElementById('bitti').style.display = 'block';
    document.getElementById('bitti-mesaj').textContent = toplam + ' kayıt başarıyla yüklendi. Sistemi yenileyebilirsiniz.';
    durum.textContent = '✅ Tamamlandı!';
    sure.textContent = '';
    bar.style.width = '100%';
    bar.style.background = '#16a34a';

  } catch(e) {
    hata.style.display = 'block';
    hata.textContent = 'Yükleme hatası: ' + e.message;
    btn.disabled = false;
    btn.textContent = '🔄 Tekrar Dene';
  }
}
